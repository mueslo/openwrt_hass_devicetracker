name: Build hass-tracker package

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sdk_tag: ["x86_64-main", "aarch64_cortex-a72-main"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for cross-arch builds
        if: matrix.sdk_tag != 'x86_64-main'
        uses: docker/setup-qemu-action@v3

      - name: Build package
        run: |
          mkdir -p artifacts
          docker run --rm \
            -v $PWD/packages/net/hass-tracker:/package:ro \
            -v $PWD/artifacts:/output:rw \
            openwrt/sdk:${{ matrix.sdk_tag }} \
            bash -c '
              set -euo pipefail
              bash ./setup.sh
              cp -r /package feeds/packages/net/hass-tracker
              ./scripts/feeds update -i
              ./scripts/feeds install hass-tracker
              echo "CONFIG_USE_APK=y" >> .config
              echo "CONFIG_SIGNED_PACKAGES=n" >> .config
              make defconfig
              make package/hass-tracker/compile -j$(nproc)
              APK=$(find bin -name "hass-tracker*.apk" | head -1)
              if [ -z "$APK" ]; then
                echo "::error::no .apk produced"
                find bin -type f 2>/dev/null | head -30
                exit 1
              fi
              cp "$APK" /output/
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hass-tracker-${{ matrix.sdk_tag }}
          path: artifacts/*.apk

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "**/*.apk"
          generate_release_notes: true
